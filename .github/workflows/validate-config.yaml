name: Hub Config Validation (R)

on:
  workflow_dispatch:
  pull_request:
    branches: main
    paths:
      - 'hub-config/**'
      - '!**README**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate-hub-config:
    runs-on: ubuntu-22.04
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.number }}
      HUB_PATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          install-r: false
          use-public-rspm: true
          extra-repositories: 'https://hubverse-org.r-universe.dev'

      - name: Update R
        run: |
          sudo apt-get update

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache: 'always'
          packages: |
            any::hubAdmin
            any::sessioninfo

      - name: Run validations
        id: validate
        run: hubAdmin::ci_validate_hub_config(diff = "${{ runner.temp }}/diff.md")
        shell: Rscript {0}
      # Posting the config diff as a PR comment needs a writable token. For
      # pull_request events from a FORK, GitHub forces GITHUB_TOKEN to be
      # read-only regardless of the `permissions:` block, so the comment step
      # would 403 ("Resource not accessible by integration") and fail the job.
      # Run it only for same-repo PRs (reviewers can still see the diff in the
      # PR's Files tab on fork PRs), and never let a comment hiccup fail the
      # config validation itself (that is the "Error on Failure" step's job).
      - name: "Comment on PR"
        id: comment-diff
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        uses: carpentries/actions/comment-diff@main
        with:
          pr: ${{ env.PR_NUMBER }}
          path: ${{ runner.temp }}/diff.md
      - name: Error on Failure
        if: ${{ steps.validate.outputs.result == 'false' }}
        run: |
          echo "::error title=Invalid Configuration::Errors were detected in one or more config files in 'hub-config/'"
          exit 1

